<style>
body {

.header {

h1 {

.container {

.button {

}

h2 {

}

h3 {

}
.button:hover {

}

@media (max-width: 768px) {
    .gallery {

    }
}

.serviços {
    color: #001;
}

.mySlides { display: none; }
img { vertical-align: middle; }

/* Slideshow container */
.slideshow-container {
  max-width: 1000px;
  position: relative;
  margin: auto;
}

/* Next & previous buttons */
.prev, .next {
  cursor: pointer;
  position: absolute;
  top: 50%;
  width: auto;
  padding: 16px;
  margin-top: -22px;
  color: white;
  font-weight: bold;
  font-size: 18px;
  transition: 0.6s ease;
  border-radius: 0 3px 3px 0;
  user-select: none;
}

/* Position the "next button" to the right */
.next {
  right: 0;
  border-radius: 3px 0 0 3px;
}

/* On hover, add a black background color with a little bit see-through */
.prev:hover, .next:hover {
  background-color: rgba(0,0,0,0.8);
}

/* Responsive */
@media screen and (max-width: 768px) {
  .prev, .next, .text { font-size: 11px }
}

/* Estilos para tablets */
@media (min-width: 768px) and (max-width: 1024px) {
    .header h1 {
        font-size: 1.5em; /* Ajuste o tamanho da fonte para tablets */
    }
    .gallery img {
        width: calc(50% - 10px); /* Duas imagens por linha em tablets */
    }
}

/* Estilos para dispositivos móveis em paisagem */
@media (max-width: 768px) and (orientation: landscape) {
    .header {
        flex-direction: column;
        text-align: center;
    }
    .header h1 {
        margin-bottom: 10px;
    }
    .gallery img {
        width: calc(50% - 10px); /* Duas imagens por linha em dispositivos móveis em paisagem */
    }
}

/* Estilos para dispositivos móveis em retrato */
@media (max-width: 768px) and (orientation: portrait) {
    .gallery img {
        width: calc(33.333% - 10px); /* Três imagens por linha em dispositivos móveis em retrato */
    }
}

/* Estilos para telas muito pequenas */
@media (max-width: 480px) {
    .header, .gallery, .button {
        padding: 10px;
    }
    .header h1 {
        font-size: 1.2em; /* Tamanho de fonte menor para telas pequenas */
    }
    .gallery img {
        width: 100%; /* Uma imagem por linha em telas muito pequenas */
    }
    .button {
        width: 100%; /* Botão se expande para a largura total em telas muito pequenas */
    }
}

</style>

<script>
    var slideIndex = 1;
    showSlides(slideIndex);
    
    function plusSlides(n) {
      showSlides(slideIndex += n);
    }
    
    function showSlides(n) {
      var i;
      var slides = document.getElementsByClassName("mySlides");
      if (n > slides.length) {slideIndex = 1}    
      if (n < 1) {slideIndex = slides.length}
      for (i = 0; i < slides.length; i++) {
          slides[i].style.display = "none";  
      }
      slides[slideIndex-1].style.display = "block";  
    }
</script>
